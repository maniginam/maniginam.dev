<!doctype html><meta charset="utf-8"><title>wordmark preview</title>
<style>
  body{margin:0;font-family:system-ui;background:#1a1a1a;color:#ccc}
  .stage{display:flex;flex-direction:column;align-items:center;gap:0}
  .panel{width:100%;display:flex;justify-content:center;align-items:center;padding:80px 0}
  .green{background:#2D3A33}
  .charcoal{background:#26282E}
  .paper{background:#F5F2F8}
  img{width:680px;max-width:90vw}
  .label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#777;padding:10px}
</style>
<div class="stage">
  <div class="label">on dark green (your image ground)</div>
  <div class="panel green"><img src="img/wordmark.svg" alt=""></div>
  <div class="label">on brand charcoal</div>
  <div class="panel charcoal"><img src="img/wordmark.svg" alt=""></div>
  <div class="label">on paper</div>
  <div class="panel paper"><img src="img/wordmark.svg" alt=""></div>
</div>
