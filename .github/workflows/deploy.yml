name: Deploy maniginam.dev

# Deploys the site to Cloudflare Pages on every push to master,
# but ONLY after the test suite passes. Builds from the committed ref —
# no uncommitted working-directory state ever reaches production.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate)
        run: npm test

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2203bbfa5aa8d8c46b2fa093ebbb2c14
          # --branch=main marks this as a PRODUCTION deploy for this project.
          # KV bindings (STATS, SIGNUPS) and secrets (ADMIN_TOKEN, SESSION_SECRET)
          # are managed in the Cloudflare dashboard at the project level.
          command: pages deploy . --project-name=maniginam-dev --branch=main
