<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · Demos</title>
  <link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
  <div id="bar"></div>
  <div class="wrap">
    <div class="card demo-card">
      <div><h3 style="margin:.2rem 0">The Chop Shop</h3>
        <span style="color:var(--muted)">Static restaurant demo — menu, cart, checkout.</span></div>
      <a href="/admin/demo/chopshop/"><button>Open demo →</button></a>
    </div>
    <div class="card demo-card">
      <div><h3 style="margin:.2rem 0">WBR Budget Autofill</h3>
        <span style="color:var(--muted)">Drop parish reports → AI reads them → verify → export CSV &amp; Excel.</span></div>
      <a href="/admin/demo/wbr-fintech/"><button>Open demo →</button></a>
    </div>
  </div>
  <script type="module">
    import { topbar, logout } from '/admin/assets/admin.js';
    document.getElementById('bar').innerHTML = topbar('demos');
    document.getElementById('logout').addEventListener('click', e => { e.preventDefault(); logout(); });

    // Enhance each demo card with a "Copy 7-day share link" button.
    // The link lets the owner open the demo with no admin password; it expires in 7 days.
    for (const card of document.querySelectorAll('.demo-card')) {
      const open = card.querySelector('a[href^="/admin/demo/"]');
      const m = open && open.getAttribute('href').match(/\/admin\/demo\/([^/]+)\//);
      if (!m) continue;
      const slug = m[1];
      const btn = document.createElement('button');
      btn.textContent = 'Copy 7-day link';
      btn.style.marginLeft = '.5rem';
      btn.style.background = 'transparent';
      btn.style.border = '1px solid var(--accent)';
      btn.style.color = 'var(--accent)';
      btn.addEventListener('click', async () => {
        btn.textContent = '…';
        try {
          const r = await fetch(`/admin/api/share?demo=${encodeURIComponent(slug)}&days=7`);
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'failed');
          await navigator.clipboard.writeText(data.url);
          const exp = new Date(data.expires).toLocaleDateString();
          btn.textContent = `Copied! (expires ${exp})`;
        } catch (e) {
          btn.textContent = 'Error — try again';
        }
        setTimeout(() => { btn.textContent = 'Copy 7-day link'; }, 4000);
      });
      open.parentElement.appendChild(btn);
    }
  </script>
</body>
</html>
